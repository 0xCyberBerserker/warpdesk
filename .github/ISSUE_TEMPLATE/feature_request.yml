name: Feature request
description: Propose a translation, feature, UX improvement, or packaging target
title: "[feature] "
labels:
  - enhancement
body:
  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - Translation
        - UI or UX
        - Packaging
        - Backend behavior
        - CI or release automation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature or change.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Mockups, screenshots, language notes, distro targets, or implementation hints.
